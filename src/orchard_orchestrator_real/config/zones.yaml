# 5 车实机 demo 场地布局（3 picker + 2 transporter）
# 场地：动捕 4m(x) × 3m(y)，原点在形心；x 负方向硬极限 -1.6
# 走道（y）：bot=-0.67 / mid=0.34 / top=1.56

field:
  x: [-1.5, 2.0]
  y: [-1.0, 2.0]

picker_ids: [1, 2, 3]

picker_base:
  robot1: [-1.0, -0.67]
  robot2: [-1.0,  0.34]
  robot3: [-1.0,  1.56]

picker_midpoint:
  robot1: [0.0, -0.67]
  robot2: [0.0,  0.34]
  robot3: [0.0,  1.56]

picker_endpoint:
  robot1: [1.2, -0.67]
  robot2: [1.2,  0.34]
  robot3: [1.2,  1.56]

transporter_ids: [4, 5]

transporter_initial_position:
  robot4: [1.7, -0.67]
  robot5: [1.7,  1.56]

east_stops:
  lane_bot: [1.7, -0.67]
  lane_mid: [1.7,  0.34]
  lane_top: [1.7,  1.56]

picker_to_lane:
  robot1: lane_bot
  robot2: lane_mid
  robot3: lane_top

control:
  safety_distance: 0.3
  service_unload_sec: 5.0
