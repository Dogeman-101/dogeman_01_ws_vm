DWAPlannerROS:

  # --- 全向（麦克纳姆轮）支持 ---
  # 必须为 true 才能生成 linear.y 指令；默认 false 只产生 vx + ω
  holonomic_robot: true
  y_vels: [-0.3, -0.1, 0.1, 0.3]

  # --- 速度限制 ---
  max_vel_x: 0.4
  min_vel_x: -0.1
  max_vel_y: 0.3
  min_vel_y: -0.3
  max_vel_trans: 0.4
  min_vel_trans: 0.1
  max_vel_theta: 1.0
  min_vel_theta: 0.4

  # --- 加速度限制 ---
  acc_lim_x: 1.5
  acc_lim_y: 1.5
  acc_lim_theta: 3.2

  # --- 目标容差 ---
  xy_goal_tolerance: 0.10
  yaw_goal_tolerance: 0.10
  latch_xy_goal_tolerance: false

  # --- 轨迹采样 ---
  sim_time: 1.5
  sim_granularity: 0.025
  angular_sim_granularity: 0.025
  vx_samples: 10
  vy_samples: 6
  vth_samples: 20

  # --- 评分权重 ---
  path_distance_bias: 32.0
  goal_distance_bias: 20.0
  occdist_scale: 0.02
  forward_point_distance: 0.325
  stop_time_buffer: 0.2
  scaling_speed: 0.25
  max_scaling_factor: 0.2
  publish_cost_grid_pc: false
